name: Sync Multiple Repositories

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10:00 自动运行。你可以根据需要修改时间。
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动点击按钮触发同步

jobs:
  sync_repos:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取你自己的这个总备份仓库
      - name: Checkout My Repo
        uses: actions/checkout@v3
        with:
          path: main-repo

      # 2. 拉取第一个目标仓库：p115client
      - name: Checkout Target Repo 1
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p115client # 【已修改】原作者用户名/仓库名
          path: temp/p115client # 【已修改】临时存放的文件夹名称

      # 3. 拉取第二个目标仓库：p123client
      - name: Checkout Target Repo 2
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p123client # 【已修改】原作者用户名/仓库名
          path: temp/p123client # 【已修改】临时存放的文件夹名称

      # 4. 转移文件并提交到你的总仓库
      - name: Process and Commit
        run: |
          # 进入你的主仓库目录
          cd main-repo
          
          # 【核心防删库逻辑】删除别人仓库的 .git 隐藏文件夹，断开与原作者的命运绑定
          rm -rf ../temp/p115client/.git
          rm -rf ../temp/p123client/.git
          
          # 将纯代码同步到你主仓库的指定子文件夹中
          # 如果你的总仓库里还没有这两个文件夹，rsync 会自动创建它们
          rsync -a --delete ../temp/p115client/ ./p115client/ # 【已修改】同步到你仓库下的 p115client 文件夹
          rsync -a --delete ../temp/p123client/ ./p123client/ # 【已修改】同步到你仓库下的 p123client 文件夹
          
          # 配置 Git 机器人身份（保持默认即可，不需要改成你的真实邮箱）
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          
          # 暂存所有更改
          git add .
          
          # 如果有文件更新就 commit 并 push；如果没有变化则静默跳过，不会产生无意义的提交
          if git diff --staged --quiet; then
            echo "没有发现任何代码更新。"
          else
            git commit -m "自动同步最新代码: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main # 【需注意】如果你的总仓库主分支叫 master，请把 main 改为 master
          fi
