name: Sync Multiple Repositories

on:
  schedule:
    - cron: '0 2 * * *' # 每天北京时间上午 10:00 自动运行
  workflow_dispatch: # 允许手动点击触发

jobs:
  sync_repos:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 拉取你自己的这个总备份仓库
      - name: Checkout My Repo
        uses: actions/checkout@v3
        with:
          path: main-repo

      # 2. 拉取各个目标仓库
      - name: Checkout Target Repo 1
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p115client
          path: temp/p115client

      - name: Checkout Target Repo 2
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p123client
          path: temp/p123client

      - name: Checkout Target Repo 3
        uses: actions/checkout@v3
        with:
          repository: fish2018/pansou
          path: temp/pansou

      - name: Checkout Target Repo 4
        uses: actions/checkout@v3
        with:
          repository: fish2018/pansou-web
          path: temp/pansou-web

      # 3. 核心处理、精准差异化提取与优雅通知
      - name: Process, Commit and Notify
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }} # 从 GitHub Secrets 读取
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}     # 从 GitHub Secrets 读取
        run: |
          cd main-repo
          
          # 断开与原作者的命运绑定
          rm -rf ../temp/p115client/.git ../temp/p123client/.git ../temp/pansou/.git ../temp/pansou-web/.git
          
          # 增量同步文件
          rsync -a --delete ../temp/p115client/ ./p115client/
          rsync -a --delete ../temp/p123client/ ./p123client/
          rsync -a --delete ../temp/pansou/ ./pansou/
          rsync -a --delete ../temp/pansou-web/ ./pansou-web/
          
          # 配置 Git 机器人身份
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          
          # 暂存所有更改以供 Git 比对
          git add .
          
          # 【逻辑分流】检查是否有代码更新
          if git diff --staged --quiet; then
            echo "未检测到GitHub代码更新。"
            
            # 情况 1：无更新时的优雅文案 (解决 YAML 缩进冲突)
            MSG="🔔 <b>GitHub同步简报</b>"
            MSG="$MSG"$'\n\n'"☕ 您好，今日定时同步已顺利完成。"
            MSG="$MSG"$'\n'"✨ 您密切关注的几个GitHub仓库<b>均无任何更新</b>，备份库继续保持在最新状态。"
            
          else
            echo "检测到代码更新，正在生成明细..."
            STAGED_FILES=$(git diff --cached --name-only)
            
            # 情况 2：有更新时的优雅文案头部 (解决 YAML 缩进冲突)
            MSG="🔔 <b>GitHub同步简报</b>"
            MSG="$MSG"$'\n\n'"🚀 您好，今日定时同步发现代码变动，已自动安全合并并推送至您的主分支。"
            MSG="$MSG"$'\n\n'"<b>📋 本次更新细节如下：</b>"
            
            for repo in p115client p123client pansou pansou-web; do
              if echo "$STAGED_FILES" | grep -q "^${repo}/"; then
                REPO_FILES=$(echo "$STAGED_FILES" | grep "^${repo}/" | sed "s|^${repo}/|  └── 📄 |" | head -n 10)
                TOTAL_COUNT=$(echo "$STAGED_FILES" | grep -c "^${repo}/" || true)
                
                MSG="$MSG"$'\n\n'"📦 <b>${repo}</b>"
                MSG="$MSG"$'\n'"${REPO_FILES}"
                
                if [ "$TOTAL_COUNT" -gt 10 ]; then
                  MSG="$MSG"$'\n'"  └── 📝 <i>...等共 ${TOTAL_COUNT} 个文件变动</i>"
                fi
              fi
            done
            
            # 稳妥提交并推送到你的总仓库
            git commit -m "自动同步最新代码: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
          
          # 【发送通知】通过 Telegram API 发送格式化后的 HTML 优雅消息
          if [ ! -z "$TG_BOT_TOKEN" ] && [ ! -z "$TG_CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=${MSG}" > /dev/null
            echo "Telegram 优雅通知已成功送达。"
          else
            echo "⚠️ 未检测到 TG_BOT_TOKEN 或 TG_CHAT_ID 密钥配置，跳过发送消息。"
          fi
