name: Sync Multiple Repositories

on:
  schedule:
    - cron: '0 11 * * *' # 每天北京时间上午 19:00 自动运行
  workflow_dispatch: # 允许手动点击触发

jobs:
  sync_repos:
    runs-on: ubuntu-latest
    # 必须给予 Action 推送代码的写权限
    permissions:
      contents: write
    
    steps:
      # 1. 拉取你自己的这个总备份仓库
      - name: Checkout My Repo
        uses: actions/checkout@v3
        with:
          path: main-repo

      # 2. 拉取所有的目标仓库 (共8个)
      - name: Checkout Target Repo 1
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p115client
          path: temp/p115client

      - name: Checkout Target Repo 2
        uses: actions/checkout@v3
        with:
          repository: ChenyangGao/p123client
          path: temp/p123client

      - name: Checkout Target Repo 3
        uses: actions/checkout@v3
        with:
          repository: fish2018/pansou
          path: temp/pansou

      - name: Checkout Target Repo 4
        uses: actions/checkout@v3
        with:
          repository: fish2018/pansou-web
          path: temp/pansou-web

      - name: Checkout Target Repo 5
        uses: actions/checkout@v3
        with:
          repository: Ponphil/LitePan
          path: temp/LitePan      

      - name: Checkout Target Repo 6
        uses: actions/checkout@v3
        with:
          repository: randomshit699/Bncr_plugins
          path: temp/Bncr_plugins          

      - name: Checkout Target Repo 7
        uses: actions/checkout@v3
        with:
          repository: Mayuri-Chan/pyrofork
          path: temp/pyrofork

      - name: Checkout Target Repo 8
        uses: actions/checkout@v3
        with:
          repository: KurimuzonAkuma/kurigram
          path: temp/kurigram

      # 3. 核心处理、精准差异化提取与优雅通知
      - name: Process, Commit and Notify
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          cd main-repo
          
          # 断开与原作者的命运绑定
          rm -rf ../temp/p115client/.git ../temp/p123client/.git ../temp/pansou/.git ../temp/pansou-web/.git ../temp/LitePan/.git ../temp/Bncr_plugins/.git ../temp/pyrofork/.git ../temp/kurigram/.git
          
          # 增量同步文件
          rsync -a --delete ../temp/p115client/ ./p115client/
          rsync -a --delete ../temp/p123client/ ./p123client/
          rsync -a --delete ../temp/pansou/ ./pansou/
          rsync -a --delete ../temp/pansou-web/ ./pansou-web/
          rsync -a --delete ../temp/LitePan/ ./LitePan/
          rsync -a --delete ../temp/Bncr_plugins/ ./Bncr_plugins/
          rsync -a --delete ../temp/pyrofork/ ./pyrofork/
          rsync -a --delete ../temp/kurigram/ ./kurigram/
          
          # 配置 Git 机器人身份
          git config user.name 'GitHub Actions Bot'
          git config user.email 'actions@github.com'
          
          # 暂存所有更改以供 Git 比对
          git add .
          
          # 提取状态明细
          STAGED_FILES=$(git diff --cached --name-only)
          HAS_UPDATE=false
          if [ -n "$STAGED_FILES" ]; then
            HAS_UPDATE=true
          fi
          
          # 定义需要监控的模块列表
          repos=("p115client" "p123client" "pansou" "pansou-web" "LitePan" "Bncr_plugins" "pyrofork" "kurigram")
          
          # 定义每个仓库的超链接映射字典
          declare -A repo_urls=(
            ["p115client"]="https://github.com/ChenyangGao/p115client"
            ["p123client"]="https://github.com/ChenyangGao/p123client"
            ["pansou"]="https://github.com/fish2018/pansou"
            ["pansou-web"]="https://github.com/fish2018/pansou-web"
            ["LitePan"]="https://github.com/Ponphil/LitePan"
            ["Bncr_plugins"]="https://github.com/randomshit699/Bncr_plugins"
            ["pyrofork"]="https://github.com/Mayuri-Chan/pyrofork"
            ["kurigram"]="https://github.com/KurimuzonAkuma/kurigram"
          )
          
          TABLE_ROWS=""
          DETAILS=""
          
          # 遍历仓库处理数据
          for repo in "${repos[@]}"; do
            if echo "$STAGED_FILES" | grep -q "^${repo}/"; then
              FILE_COUNT=$(echo "$STAGED_FILES" | grep -c "^${repo}/")
              STATUS="✅ <b>更新</b>"
              
              # 提取前5个变动文件，使用全角空格对齐防止解析错误
              REPO_FILES=$(echo "$STAGED_FILES" | grep "^${repo}/" | sed "s|^${repo}/| ├─ 📄 |" | head -n 5)
              
              DETAILS="${DETAILS}📦 <b><a href=\"${repo_urls[$repo]}\">${repo}</a></b>"$'\n'"${REPO_FILES}"$'\n'
              if [ "$FILE_COUNT" -gt 5 ]; then
                DETAILS="${DETAILS} └─ 📝 <i>...等共 ${FILE_COUNT} 个文件</i>"$'\n'
              fi
              DETAILS="${DETAILS}"$'\n'
            else
              FILE_COUNT="0"
              STATUS="➖ 挂机"
            fi
            
            # 【核心恢复】: 给仓库名套上超链接，并拼接进 HTML 原生表格
            LINK="<a href=\"${repo_urls[$repo]}\">${repo}</a>"
            TABLE_ROWS="${TABLE_ROWS}<tr><td>${LINK}</td><td>${STATUS}</td><td>${FILE_COUNT}</td></tr>"$'\n'
          done
          
          # 拼装带有原生表格的基础 HTML
          cat <<EOF > tg_msg.html
          <h3>🔔 GitHub 库级监控简报</h3>
          <p>🤖 今日自动扫描任务已执行完毕。</p>
          
          <h4>📊 框架变动全景纵览</h4>
          <table border="1">
              <tr>
                  <th>监控库名</th>
                  <th>今日状态</th>
                  <th>变动数</th>
              </tr>
              ${TABLE_ROWS}
          </table>
          EOF
          
          if [ "$HAS_UPDATE" = true ]; then
            # 【核心修复】: 拼装折叠块，必须用物理空行隔离，激活 Telegram 原生折叠逻辑
            cat <<EOF >> tg_msg.html
          
          <blockquote expandable>💡 <b>详细代码变动日志（点击展开）</b>
          
          ${DETAILS}</blockquote>
          EOF
            
            # 稳妥提交并推送
            git commit -m "自动同步代码: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "检测到代码更新，提交推送成功。"
          else
            echo "所有监控库均未发现代码更新。"
          fi
          
          # 执行 Python 脚本发送通知
          python3 -c '
          import os, json, urllib.request
          
          token = os.environ.get("TG_BOT_TOKEN")
          chat_id = os.environ.get("TG_CHAT_ID")
          
          if not token or not chat_id:
              print("⚠️ 未检测到密钥，跳过发送。")
              exit(0)
              
          with open("tg_msg.html", "r", encoding="utf-8") as f:
              html_content = f.read()
              
          # 【致胜关键】: 接口切回 API 10.1 专属的 sendRichMessage，彻底接纳 <table> 标签
          url = f"https://api.telegram.org/bot{token}/sendRichMessage"
          
          data = {
              "chat_id": chat_id,
              "rich_message": {"html": html_content},
              "link_preview_options": {"is_disabled": True} # 屏蔽超链接的网页预览卡片
          }
          
          req = urllib.request.Request(
              url, 
              data=json.dumps(data).encode("utf-8"), 
              headers={"Content-Type": "application/json"}
          )
          
          try:
              with urllib.request.urlopen(req) as response:
                  print("✅ Telegram 原生表格与完美折叠排版通知已成功送达！")
          except Exception as e:
              print(f"❌ 发送失败: {e}")
              if hasattr(e, "read"):
                  print(e.read().decode("utf-8"))
          '
